services:
  # Backend
  - type: web
    name: gold-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # Frontend
  - type: static
    name: gold-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://gold-backend.onrender.com/api/* # Replace with your backend URL
      - type: rewrite
        source: /*
        destination: /index.html
