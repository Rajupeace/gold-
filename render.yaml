services:
  # Backend
    - type: web
      name: gold-backend
            env: node
                rootDir: server
                    buildCommand: npm install
                        startCommand: npm start
                            envVars:
                                  - key: NODE_ENV
                                          value: production
                                                - key: MONGODB_URI
                                                        sync: false
                                                              - key: JWT_SECRET
                                                                      sync: false

                                                                        # Frontend
                                                                          - type: web
                                                                              name: gold-frontend
                                                                                  env: static
                                                                                      rootDir: client
                                                                                          buildCommand: npm install && npm run build
                                                                                              staticPublishPath: dist
                                                                                              
